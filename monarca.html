<!doctype html>

<head>

<title>Monarca · Inventario y Producción</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --navy:#1E3A7A; --navy-2:#15295C; --gold:#8A8D92; --gold-2:#BFC1C4;
    --red:#C0392B; --green:#2E8B57; --amber:#D68910; --teal:#1F7A8C;
    --bg:#F4F6FA; --card:#FFFFFF; --ink:#1B2433; --muted:#6B7480; --line:#E3E7EE;
    --shadow:0 1px 2px rgba(30,58,122,.06), 0 4px 14px rgba(30,58,122,.08);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; font-size:15px; line-height:1.45; }
  button { font-family:inherit; cursor:pointer; }
  a { color:inherit; }
  .app { max-width:520px; margin:0 auto; min-height:100vh; background:var(--bg); display:flex; flex-direction:column; padding-bottom:74px; }
  header.bar {
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    color:#fff; padding:14px 16px 14px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:50;
    box-shadow:0 2px 10px rgba(30,58,122,.22);
  }
  header.bar .logo { width:34px; height:34px; border-radius:8px; background:#fff; color:var(--navy); display:flex; align-items:center; justify-content:center; padding:3px; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  header.bar .logo svg { width:100%; height:100%; display:block; }
  header.bar h1 { margin:0; font-size:16px; font-weight:600; letter-spacing:.2px; }
  header.bar .who { margin-left:auto; font-size:11.5px; text-align:right; opacity:.92; }
  header.bar .who b { display:block; font-size:12.5px; font-weight:600; }
  header.bar .back { background:rgba(255,255,255,.12); border:0; color:#fff; padding:6px 10px; border-radius:8px; font-size:13px; }
  nav.tabbar {
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    display:flex; justify-content:space-around; padding:6px 4px 8px 4px; z-index:40;
    box-shadow:0 -2px 12px rgba(0,0,0,.05);
  }
  nav.tabbar .center { max-width:520px; width:100%; margin:0 auto; display:flex; justify-content:space-around; }
  nav.tabbar button {
    background:transparent; border:0; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10.5px; padding:4px 6px; border-radius:8px; min-width:60px;
  }
  nav.tabbar button.active { color:var(--navy); font-weight:600; }
  nav.tabbar svg { width:22px; height:22px; }
  main { padding:14px 14px 20px 14px; flex:1; }
  .screen { display:none; }
  .screen.active { display:block; animation:fadein .18s ease-out; }
  @keyframes fadein { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .card h3 { margin:0 0 8px 0; font-size:14px; font-weight:600; color:var(--navy); }
  .card .sub { font-size:12px; color:var(--muted); margin-top:-4px; margin-bottom:8px; }
  .row { display:flex; gap:10px; }
  .row > * { flex:1; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .stat { background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px 12px; box-shadow:var(--shadow); }
  .stat .v { font-size:22px; font-weight:700; color:var(--navy); line-height:1.1; }
  .stat .l { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .stat .d { font-size:11px; margin-top:4px; font-weight:600; }
  .stat .d.up { color:var(--green); }
  .stat .d.dn { color:var(--red); }
  .pill { display:inline-block; padding:2px 8px; font-size:11px; border-radius:99px; font-weight:600; }
  .pill.red { background:#FBE3E0; color:var(--red); }
  .pill.amber { background:#FCEFD2; color:#8C6B0E; }
  .pill.green { background:#DCEFE1; color:#1F6E40; }
  .pill.navy { background:#E2E9F4; color:var(--navy); }
  .pill.gold { background:#EDEEEF; color:#4E5156; }
  .list { display:flex; flex-direction:column; }
  .item { display:flex; gap:10px; align-items:center; padding:10px 4px; border-bottom:1px solid var(--line); }
  .item:last-child { border-bottom:0; }
  .item .ico { width:34px; height:34px; flex:0 0 34px; border-radius:8px; background:#EAF0FB; color:var(--navy); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .item .info { flex:1; min-width:0; }
  .item .info .t { font-weight:600; font-size:13.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item .info .s { font-size:12px; color:var(--muted); }
  .item .right { text-align:right; font-size:12px; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 14px; border-radius:10px; border:0; background:var(--navy); color:#fff; font-weight:600; font-size:14px; }
  .btn.gold { background:var(--gold); color:var(--navy); }
  .btn.ghost { background:#fff; color:var(--navy); border:1px solid var(--navy); }
  .btn.danger { background:var(--red); color:#fff; }
  .btn.success { background:var(--green); color:#fff; }
  .btn.full { width:100%; }
  .btn.sm { padding:7px 10px; font-size:12.5px; border-radius:8px; }
  .btn[disabled] { opacity:.45; pointer-events:none; }
  .chips { display:flex; gap:6px; overflow-x:auto; padding:2px 0 6px 0; -webkit-overflow-scrolling:touch; }
  .chips::-webkit-scrollbar { display:none; }
  .chip { white-space:nowrap; padding:6px 10px; border-radius:99px; background:#EEF1F7; color:var(--navy); font-size:12px; font-weight:600; border:1px solid transparent; }
  .chip.active { background:var(--navy); color:#fff; }
  table.t { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.t th, table.t td { padding:7px 6px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; }
  table.t th { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
  table.t td.r, table.t th.r { text-align:right; }
  .search { display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:10px; }
  .search input { flex:1; border:0; outline:0; font-size:14px; background:transparent; }
  .search svg { width:16px; height:16px; color:var(--muted); }
  .ck { width:20px; height:20px; flex:0 0 20px; border:2px solid var(--navy); border-radius:5px; display:flex; align-items:center; justify-content:center; background:#fff; cursor:pointer; }
  .ck.on { background:var(--navy); }
  .ck.on::after { content:""; width:5px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg) translate(-1px,-1px); }
  .modal-bg { position:fixed; inset:0; background:rgba(30,58,122,.55); display:none; align-items:flex-end; justify-content:center; z-index:200; }
  .modal-bg.on { display:flex; }
  .modal { background:#fff; width:100%; max-width:520px; border-radius:18px 18px 0 0; padding:18px 18px 24px 18px; max-height:88vh; overflow-y:auto; }
  @media(min-width:600px) { .modal-bg { align-items:center; } .modal { border-radius:18px; } }
  .modal h3 { margin:0 0 6px 0; font-size:16px; color:var(--navy); }
  .modal h4 { margin:14px 0 6px 0; font-size:13px; color:var(--navy); }
  .modal .x { float:right; background:transparent; border:0; font-size:22px; color:var(--muted); cursor:pointer; line-height:1; }
  .modal label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px 0; font-weight:600; }
  .modal input, .modal select, .modal textarea {
    width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font-size:14px; outline:0; font-family:inherit;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color:var(--navy); }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 18px; border-radius:99px; font-size:13px; z-index:300; opacity:0; pointer-events:none; transition:opacity .2s; box-shadow:0 4px 16px rgba(0,0,0,.2); }
  .toast.on { opacity:1; }
  .welcome { background:linear-gradient(135deg,var(--navy) 0%, var(--navy-2) 100%); color:#fff; padding:18px 16px; border-radius:14px; margin-bottom:14px; box-shadow:var(--shadow); }
  .welcome h2 { margin:0 0 4px 0; font-size:18px; font-weight:600; }
  .welcome p { margin:0; opacity:.85; font-size:13px; }
  .welcome .role-tag { display:inline-block; background:var(--gold); color:var(--navy); padding:3px 9px; border-radius:99px; font-size:11px; font-weight:700; margin-bottom:8px; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .action-btn { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 12px; box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:flex-start; gap:6px; text-align:left; cursor:pointer; }
  .action-btn .ico-bg { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .action-btn .ico-bg svg { width:22px; height:22px; }
  .action-btn .t { font-weight:600; font-size:13.5px; color:var(--navy); }
  .action-btn .s { font-size:11.5px; color:var(--muted); }
  .login-screen { min-height:100vh; background:linear-gradient(135deg,var(--navy) 0%, #06182E 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; color:#fff; }
  .login-screen .brand { text-align:center; margin-bottom:24px; }
  .login-screen .brand .l { width:88px; height:88px; border-radius:18px; background:#fff; color:var(--navy); display:flex; align-items:center; justify-content:center; padding:8px; margin:0 auto 14px auto; box-shadow:0 6px 22px rgba(0,0,0,.32); }
  .login-screen .brand .l svg { width:100%; height:100%; display:block; }
  .login-screen .brand .subbrand { margin:6px 0 2px 0; font-size:11px; letter-spacing:3px; opacity:.75; text-transform:uppercase; font-weight:600; }
  .login-screen .brand h1 { margin:0; font-size:24px; }
  .login-screen .brand p { margin:4px 0 0 0; opacity:.75; font-size:13px; }
  .login-screen .roles { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:380px; width:100%; margin-top:8px; }
  .login-screen .role-card { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:12px; padding:14px 12px; color:#fff; cursor:pointer; transition:background .15s; text-align:left; }
  .login-screen .role-card:hover { background:rgba(255,255,255,.16); }
  .login-screen .role-card .n { font-weight:700; font-size:14px; }
  .login-screen .role-card .d { font-size:11.5px; opacity:.75; margin-top:3px; }
  .chart-wrap { width:100%; }
  .chart-wrap svg { width:100%; height:auto; display:block; }
  .legend { display:flex; flex-wrap:wrap; gap:10px; font-size:11.5px; margin-top:6px; }
  .legend .li { display:flex; align-items:center; gap:5px; color:var(--ink); }
  .legend .sw { width:10px; height:10px; border-radius:3px; }
  .checklist { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
  .check-row { display:flex; align-items:center; gap:10px; padding:10px; background:#FAFBFD; border:1px solid var(--line); border-radius:10px; }
  .check-row .lbl { flex:1; font-size:13.5px; }
  .check-row .ck { flex:0 0 22px; }
  .upload-zone { border:2px dashed var(--line); border-radius:12px; padding:22px 14px; text-align:center; background:#FAFBFD; }
  .upload-zone.hover { border-color:var(--navy); background:#EEF1F7; }
  .upload-zone .ico { font-size:32px; margin-bottom:6px; color:var(--navy); display:flex; justify-content:center; }
  .upload-zone .ico svg { width:42px; height:42px; }
  .upload-zone p { margin:6px 0; font-size:13px; color:var(--muted); }
  .upload-zone .hint { font-size:11.5px; color:var(--muted); }
  @media(min-width:600px) {
    .app { max-width:680px; box-shadow:0 0 30px rgba(0,0,0,.07); }
    .actions { grid-template-columns:repeat(3,1fr); }
  }
  .chips::-webkit-scrollbar, main::-webkit-scrollbar { display:none; }
  .sug-item { display:flex; gap:10px; align-items:center; padding:9px 4px; border-bottom:1px solid var(--line); }
  .sug-item:last-child { border-bottom:0; }
  .sug-item .info { flex:1; min-width:0; }
  .sug-item .info .t { font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sug-item .info .s { font-size:11.5px; color:var(--muted); }
  .sug-item .qty { text-align:right; font-size:13px; font-weight:700; min-width:65px; }
  .sug-item .qty.deficit { color:var(--red); }
  .sug-item .qty.sobre { color:var(--green); }
  .sug-item .qty.balance { color:var(--muted); }
  .banner { background:#FFF8E5; border:1px solid #F2D571; border-radius:10px; padding:9px 12px; font-size:12.5px; color:#7A5B00; margin-bottom:10px; }
  .banner b { color:#5D4400; }
  .sap-row { display:flex; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); }
  .sap-row:last-child { border-bottom:0; }
  .sap-row .dot { width:10px; height:10px; border-radius:50%; flex:0 0 10px; }
  .sap-row .dot.ok { background:var(--green); }
  .sap-row .dot.warn { background:var(--amber); }
  .sap-row .dot.err { background:var(--red); }
  .sap-row .info { flex:1; }
  .sap-row .info .t { font-size:13.5px; font-weight:600; }
  .sap-row .info .s { font-size:11.5px; color:var(--muted); }
  .sec-head { display:flex; justify-content:space-between; align-items:center; margin:14px 0 8px 0; }
  .sec-head h2 { margin:0; font-size:14px; color:var(--navy); font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
  .sec-head .link { color:var(--navy); font-size:12px; font-weight:600; text-decoration:none; cursor:pointer; }
  .gauge-wrap { position:relative; text-align:center; }
  .gauge-wrap .center-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
  .gauge-wrap .center-text .v { font-size:24px; font-weight:700; color:var(--navy); }
  .gauge-wrap .center-text .l { font-size:10px; color:var(--muted); }
  .multi-bar { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:11px 16px; border-radius:99px; font-size:13px; display:none; align-items:center; gap:10px; z-index:80; box-shadow:0 6px 20px rgba(0,0,0,.25); max-width:90%; }
  .multi-bar.on { display:flex; }
  .multi-bar button { background:var(--gold); color:var(--navy); border:0; padding:6px 12px; border-radius:99px; font-weight:700; font-size:12px; cursor:pointer; }
</style>
</head>

function init() {
  // Cargar estado guardado primero para tener usuarios/configuración disponibles
  try {
    const rawNew = localStorage.getItem("monarca_state");
    const rawOld = localStorage.getItem("pulso_state");
    const saved = JSON.parse(rawNew || rawOld || "{}");
    if (!rawNew && rawOld) { try { localStorage.setItem("monarca_state", rawOld); localStorage.removeItem("pulso_state"); } catch(e){} }
    if (saved && Object.keys(saved).length) restoreState(saved);
    seedMock();
    if (saved && saved.user && saved.role && ROLES[saved.role]) {
      // Auto-login si hay sesión válida guardada
      doLogin(saved.user, saved.role, true);
      return;
    }
  } catch(e){ try { seedMock(); } catch(_){} }
  document.getElementById("modal").addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
  });
  const d = new Date();
  const dEl = document.getElementById("whoDate");
  if (dEl) dEl.textContent = d.toLocaleDateString("es-CO", {day:"2-digit",month:"short"});
}

/* Submit del formulario de login: valida usuario + contraseña con SHA-256 */
async function doLoginSubmit() {
  const u = document.getElementById("loginUser").value.trim().toLowerCase();
  const p = document.getElementById("loginPass").value;
  const err = document.getElementById("loginErr");
  err.style.display = "none";
  if (!u || !p) {
    err.textContent = "Usuario y contraseña son obligatorios";
    err.style.display = "block";
    return;
  }
  const found = (STATE.usuarios||[]).find(x => x.usuario.toLowerCase() === u && x.activo);
  if (!found) {
    err.textContent = "Usuario no existe o está inactivo";
    err.style.display = "block";
    return;
  }
  const hash = await sha256(p);
  if (hash !== found.passHash) {
    err.textContent = "Contraseña incorrecta";
    err.style.display = "block";
    return;
  }
  doLogin({usuario: found.usuario, perfil: found.perfil, rol: found.rol, nombre: found.nombre, id: found.id}, found.rol, false);
}

function restoreState(s) {
  if (s.prog)    STATE.prog    = s.prog;
  if (s.movs)    STATE.movs    = s.movs;
  if (s.lotes)   STATE.lotes   = s.lotes;
  if (s.uploads) STATE.uploads = s.uploads;
  if (s.user)    STATE.user    = s.user;
  if (s.inventario) STATE.inventario = s.inventario;
  if (s.inventarioMeta) STATE.inventarioMeta = s.inventarioMeta;
  if (s.usuarios && s.usuarios.length) STATE.usuarios = s.usuarios;
  if (s.plantas)  STATE.plantas = s.plantas;
  if (s.maquinas) STATE.maquinas = s.maquinas;
  if (s.recetas)  STATE.recetas = s.recetas;
  if (s.materiasPrimas) STATE.materiasPrimas = s.materiasPrimas;
  if (s.config)   STATE.config = Object.assign(STATE.config, s.config);
}

async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function hasAccess(screen) {
  if (!STATE.role) return false;
  const nav = ROLES[STATE.role].nav.map(n => n.id);
  // El admin también accede a sincros, reportes, alertas, etc., como utilidades extra
  if (STATE.role === 'admin') return true;
  return nav.includes(screen) || ['home','reportes'].includes(screen);
}
/* Extrae kg por unidad desde la descripción del producto.
   Ejemplos detectados: "*930G", "*22 KG", "*4000 G", "*1000 g", "*900G" */
function parseKgPorUnidad(desc) {
  if (!desc) return null;
  const txt = String(desc).toUpperCase();
  // 1. * <numero> <unidad>
  let m = txt.match(/[\*xX]\s*(\d+(?:[\.,]\d+)?)\s*(KG|G|GR|GRS)\b/);
  if (!m) {
    // 2. <numero><unidad> al final (sin asterisco)
    m = txt.match(/(\d+(?:[\.,]\d+)?)\s*(KG|G|GR|GRS)\b(?!\w)/);
  }
  if (!m) return null;
  const cantidad = parseFloat(m[1].replace(',','.'));
  const unidad   = m[2];
  if (!isFinite(cantidad) || cantidad <= 0) return null;
  return unidad === 'KG' ? cantidad : cantidad / 1000;
}
function fmtKg(kg) {
  if (kg == null || !isFinite(kg)) return '—';
  if (kg >= 100) return kg.toFixed(0) + ' kg';
  if (kg >= 1)   return kg.toFixed(1) + ' kg';
  return (kg*1000).toFixed(0) + ' g';
}
function uid(prefix) {
  return (prefix||'') + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function refreshSug() {
  if (!document.getElementById("sugList")) return;
  const q = (STATE.search||"").toLowerCase();
  const fb = STATE.bodegaFilter;
  const fe = STATE.estadoFilter;
  let list = PROD.filter(p => {
    if (fb!=="TODAS" && p.bodega!==fb) return false;
    if (fe==="DÉFICIT" && !(p.sugerido<0)) return false;
    if (fe==="SOBRE"   && !(p.sugerido>0)) return false;
    if (fe==="BALANCE" && !(p.sugerido===0)) return false;
    if (q && !(p.codigo.toLowerCase().includes(q) || p.descripcion.toLowerCase().includes(q))) return false;
    return true;
  });
  list.sort((a,b) => a.sugerido - b.sugerido);
  const cap = list.slice(0, 200);
  const html = cap.map(sugRow).join("");
  document.getElementById("sugList").innerHTML = html || '<p style="text-align:center;color:var(--muted);padding:18px 0;">Sin resultados</p>';
  document.getElementById("sugCount").textContent = list.length+' SKUs'+(cap.length<list.length?" (mostrando 200)":"");
  refreshMultiBar();
}

function sugRow(p) {
  const sel = STATE.selected.has(p.codigo);
  let cls = "balance", txt = "0";
  if (p.sugerido < 0) { cls = "deficit"; txt = "−"+Math.abs(p.sugerido); }
  else if (p.sugerido > 0) { cls = "sobre"; txt = "+"+p.sugerido; }
  const kg = parseKgPorUnidad(p.descripcion);
  const kgInfo = kg ? ' · '+fmtKg(kg)+'/und' : '';
  return '<div class="sug-item">' +
    '<div class="ck '+(sel?'on':'')+'" onclick="toggleSel(\''+p.codigo+'\')"></div>' +
    '<div class="info" onclick="openProdDetail(\''+p.codigo+'\')" style="cursor:pointer;">' +
      '<div class="t">'+p.descripcion+'</div>' +
      '<div class="s">'+p.codigo+' · '+p.bodega+' · stock '+p.inv_total+kgInfo+' · vta '+p.ventas+'</div>' +
    '</div>' +
    '<div class="qty '+cls+'">'+txt+'</div>' +
  '</div>';
}

function toggleSel(codigo) {
  if (STATE.selected.has(codigo)) STATE.selected.delete(codigo);
  else STATE.selected.add(codigo);
  refreshSug();
}

function toggleSelectAll() {
  const q = (STATE.search||"").toLowerCase();
  const fb = STATE.bodegaFilter;
  const fe = STATE.estadoFilter;
  const list = PROD.filter(p => {
    if (fb!=="TODAS" && p.bodega!==fb) return false;
    if (fe==="DÉFICIT" && !(p.sugerido<0)) return false;
    if (fe==="SOBRE"   && !(p.sugerido>0)) return false;
    if (fe==="BALANCE" && !(p.sugerido===0)) return false;
    if (q && !(p.codigo.toLowerCase().includes(q) || p.descripcion.toLowerCase().includes(q))) return false;
    return true;
  }).slice(0,200);
  const allSel = list.every(p => STATE.selected.has(p.codigo));
  if (allSel) list.forEach(p => STATE.selected.delete(p.codigo));
  else list.forEach(p => STATE.selected.add(p.codigo));
  refreshSug();
}

function openCrearOP(codes) {
  const productos = currentProductos();
  const items = codes.length === 0 ? [] : codes.map(c => {
    const p = productos.find(x=>x.codigo===c);
    if (!p) return null;
    const cant = (p.sugerido && p.sugerido<0) ? Math.abs(p.sugerido) : Math.max(p.ventas||0, 100);
    return {codigo:p.codigo, desc:p.descripcion, cant, bodega:p.bodega};
  }).filter(Boolean);

  const today = new Date(); const isoFecha = today.toISOString().slice(0,10);

  const rowsHtml = items.length === 0
    ? '<p style="font-size:12.5px;color:var(--muted);">No hay productos seleccionados. Cancela y ve al módulo Sugerido para elegir varios.</p>'
    : '<table class="t" id="opTable"><thead><tr><th>Código</th><th>Producto</th><th class="r">Cant.</th><th class="r">Kg</th><th></th></tr></thead><tbody>' +
        items.map((it,i) => {
          const kg = parseKgPorUnidad(it.desc);
          const totalKg = kg ? (it.cant * kg).toFixed(1) : '—';
          return '<tr data-i="'+i+'" data-kgu="'+(kg||0)+'">' +
            '<td>'+it.codigo+'</td>' +
            '<td style="max-width:160px;"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+it.desc+'</div><span style="font-size:10.5px;color:var(--muted);">'+it.bodega+(kg? ' · '+fmtKg(kg)+'/und':'')+'</span></td>' +
            '<td class="r" style="width:80px;"><input type="number" value="'+it.cant+'" data-i="'+i+'" style="width:70px;text-align:right;" /></td>' +
            '<td class="r" style="width:70px;font-size:12px;color:var(--navy);"><b class="kg-cell" data-i="'+i+'">'+totalKg+'</b><br><span style="font-size:10px;color:var(--muted);">kg</span></td>' +
            '<td><button class="btn sm danger" onclick="rmOpRow('+i+')">×</button></td>' +
          '</tr>';
        }).join("") +
      '</tbody></table>';

  const totUnd = items.reduce((a,it)=>a+it.cant,0);
  let totKg = 0;
  items.forEach(it => { const k = parseKgPorUnidad(it.desc); if (k) totKg += it.cant*k; });
  const itemsJSON = JSON.stringify(items).replace(/'/g,"\\'");

  // Plantas y máquinas — opciones del select
  const plantOpts = (STATE.plantas||[]).map(p => '<option value="'+p.id+'">'+p.nombre+'</option>').join("");
  const maqOpts = '<option value="">— Selecciona planta primero —</option>';

  const liderName = (STATE.user && STATE.user.nombre) ? STATE.user.nombre : 'C. Rodríguez';

  const html = '<button class="x" onclick="closeModal()">×</button>' +
    '<h3>Crear Orden de Producción</h3>' +
    '<p style="font-size:12.5px;color:var(--muted);margin:0 0 8px 0;">Producto → cantidad → kg → máquina disponible → tiempo.</p>' +
    '<div class="row">' +
      '<div><label>Fecha</label><input type="date" id="opFecha" value="'+isoFecha+'" /></div>' +
      '<div><label>Turno</label><select id="opTurno"><option>Día</option><option>Tarde</option><option>Noche</option></select></div>' +
    '</div>' +
    '<div class="row" style="margin-top:8px;">' +
      '<div><label>Planta</label><select id="opPlanta" onchange="onPlantaChange()">' +
        '<option value="">— Selecciona —</option>' + plantOpts +
      '</select></div>' +
      '<div><label>Máquina</label><select id="opMaquina">' + maqOpts + '</select></div>' +
    '</div>' +
    '<div class="row" style="margin-top:8px;">' +
      '<div><label>Inicio</label><input type="datetime-local" id="opInicio" /></div>' +
      '<div><label>Fin</label><input type="datetime-local" id="opFin" /></div>' +
    '</div>' +
    '<label style="margin-top:8px;">Líder responsable</label><input id="opLider" value="'+liderName+'" />' +
    '<h4>Productos (<span id="opN">'+items.length+'</span>)</h4>' +
    '<div id="opItemsHost">'+rowsHtml+'</div>' +
    '<p style="font-size:12px;color:var(--muted);margin:6px 0 0 0;">Total: <b id="opTotal">'+totUnd.toLocaleString("es-CO")+'</b> unidades · <b id="opKg">'+totKg.toFixed(1)+'</b> kg</p>' +
    ((STATE.plantas||[]).length===0 ? '<p style="font-size:11px;color:var(--amber);margin-top:6px;">⚠️ No hay plantas configuradas. Pídele al admin que las cree en <b>Plantas y máquinas</b>.</p>' : '') +
    '<div class="row" style="margin-top:16px;">' +
      '<button class="btn ghost" onclick="closeModal()">Cancelar</button>' +
      '<button class="btn" onclick=\'confirmCrearOP('+itemsJSON+')\' '+(items.length===0?'disabled':'')+'>Crear OP</button>' +
    '</div>';
  openModal(html);
  setTimeout(()=>{
    document.querySelectorAll("#opTable input[type=number]").forEach(inp => {
      inp.addEventListener("input", () => recalcOpTotal());
    });
  },50);
}

/* Filtra máquinas según planta seleccionada y, opcionalmente, productos asignados */
function onPlantaChange() {
  const sel = document.getElementById("opPlanta");
  const target = document.getElementById("opMaquina");
  if (!sel || !target) return;
  const pid = sel.value;
  if (!pid) {
    target.innerHTML = '<option value="">— Selecciona planta primero —</option>';
    return;
  }
  // Productos en la OP
  const codes = [];
  document.querySelectorAll("#opTable tbody tr").forEach(tr => {
    const td = tr.querySelector("td:first-child");
    if (td) codes.push(td.textContent.trim());
  });
  const maqs = (STATE.maquinas||[]).filter(m => m.plantaId === pid);
  // Máquinas que cubren al menos uno de los productos (sin asignación → válida para cualquiera)
  const compatibles = maqs.filter(m => !m.productos || m.productos.length===0 || m.productos.some(c => codes.includes(c)));
  if (!compatibles.length) {
    target.innerHTML = '<option value="">— Sin máquinas '+(codes.length? 'compatibles':'configuradas')+' —</option>';
    return;
  }
  target.innerHTML = '<option value="">— Selecciona —</option>' +
    compatibles.map(m => '<option value="'+m.id+'">'+m.nombre+(m.capacidad_kg_h? ' · '+m.capacidad_kg_h+' kg/h':'')+'</option>').join("");
}

function rmOpRow(i) {
  const tr = document.querySelector('#opTable tbody tr[data-i="'+i+'"]');
  if (tr) tr.remove();
  recalcOpTotal();
  document.getElementById("opN").textContent = document.querySelectorAll("#opTable tbody tr").length;
}
function recalcOpTotal() {
  let s = 0;
  let kgTot = 0;
  document.querySelectorAll("#opTable tbody tr").forEach(tr => {
    const inp = tr.querySelector('input[type=number]');
    if (!inp) return;
    const cant = (+inp.value || 0);
    s += cant;
    const kgu = parseFloat(tr.dataset.kgu||'0');
    const cell = tr.querySelector('.kg-cell');
    if (kgu > 0) {
      const total = cant * kgu;
      kgTot += total;
      if (cell) cell.textContent = total.toFixed(1);
    } else if (cell) {
      cell.textContent = '—';
    }
  });
  const t = document.getElementById("opTotal");
  if (t) t.textContent = s.toLocaleString("es-CO");
  const k = document.getElementById("opKg");
  if (k) k.textContent = kgTot.toFixed(1);
}

function confirmCrearOP(items) {
  const live = items.slice();
  document.querySelectorAll("#opTable tbody tr").forEach(tr => {
    const i = +tr.dataset.i;
    const inp = tr.querySelector("input[type=number]");
    if (inp && live[i]) live[i].cant = +inp.value;
  });
  const valid = live.filter((_,i) => document.querySelector('#opTable tbody tr[data-i="'+i+'"]'));
  if (valid.length === 0) { toast("Sin productos válidos"); return; }

  // Anota kg en cada producto para reporte y costeo
  valid.forEach(it => {
    const kg = parseKgPorUnidad(it.desc);
    if (kg) { it.kg_por_unidad = kg; it.kg_total = +(it.cant * kg).toFixed(2); }
  });
  const totKg = valid.reduce((a,it) => a + (it.kg_total||0), 0);

  const plantaId  = (document.getElementById("opPlanta")||{}).value || "";
  const maquinaId = (document.getElementById("opMaquina")||{}).value || "";
  const inicio    = (document.getElementById("opInicio")||{}).value || "";
  const fin       = (document.getElementById("opFin")||{}).value || "";

function saveMov(tipo) {
  const cod = document.getElementById("mvCodigo").value || (document.getElementById("mvProd").value||"").split(" · ")[0];
  const cant = +document.getElementById("mvCant").value;
  const doc = document.getElementById("mvDoc").value || "-";
  if (!cod || !cant) { toast("Completa producto y cantidad"); return; }
  const p = PROD.find(x=>x.codigo===cod);
  if (!p) { toast("Producto no encontrado"); return; }
  if (tipo==="entrada") { p.inv_total += cant; p.inv_bodega += cant; }
  else { p.inv_total = Math.max(0, p.inv_total - cant); p.inv_bodega = Math.max(0, p.inv_bodega - cant); }
  p.sugerido = p.inv_total - p.ventas;
  const now = new Date(); const ts = now.toISOString().slice(0,10) + " " + now.toTimeString().slice(0,5);
  STATE.movs.unshift({tipo, codigo:cod, desc:p.descripcion, cant, ts, op:doc, user:"O. Pérez"});
  persist();
  closeModal();
  toast(tipo==="entrada"?"Entrada registrada · stock +"+cant : "Salida registrada · stock −"+cant);
  showScreen(STATE.screen);
}

/* === Lectura real de Excel con SheetJS — alimenta STATE.inventario === */
function procesarExcelInventario(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    toast("⚠️ Lector Excel no disponible (sin conexión)");
    return;
  }
  const tipo = (document.getElementById("impTipo")||{}).value || "Inventario producto terminado";
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, {type:'array'});
      const sh   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sh, {defval:""});
      if (!rows.length) { toast("Archivo vacío"); return; }
      // Mapeo flexible de columnas — tolerante a mayúsculas/acentos/espacios
      const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const sample = rows[0];
      const keys = Object.keys(sample);
      const taken = new Set();
      const findKey = (...candidates) => {
        for (const c of candidates) {
          const k = keys.find(x => !taken.has(x) && norm(x).includes(c));
          if (k) { taken.add(k); return k; }
        }
        return null;
      };
      const kCod = findKey('numero de articulo','numero','codigo','code','sku');
      const kDesc= findKey('descripcion','description','nombre','articulo');
      const kStk = findKey('en stock','stock','existencia','inventario');
      const kPre = findKey('precio articulo','precio','costo','valor unitario');
      const kTot = findKey('total');
      const kBod = findKey('bodega','warehouse','almacen');
      if (!kCod || !kDesc) {
        toast("⚠️ El Excel no tiene columnas CODIGO / DESCRIPCION");
        return;
      }
      const inv = rows
        .filter(r => String(r[kCod]||'').trim())
        .map(r => {
          const desc = String(r[kDesc]||'').trim();
          const stock = parseFloat(String(r[kStk]||'0').toString().replace(/[^\d.\-]/g,'')) || 0;
          const precio = kPre ? (parseFloat(String(r[kPre]||'0').toString().replace(/[^\d.\-]/g,'')) || 0) : 0;
          const total = kTot ? (parseFloat(String(r[kTot]||'0').toString().replace(/[^\d.\-]/g,'')) || (stock*precio)) : (stock*precio);
          const kgUnidad = parseKgPorUnidad(desc);
          return {
            codigo: String(r[kCod]).trim(),
            descripcion: desc,
            bodega: kBod ? (String(r[kBod]||'GENERAL').trim() || 'GENERAL') : 'GENERAL',
            inv_planta: 0,
            inv_bodega: stock,
            inv_total: stock,
            ventas: 0,
            sugerido: 0,
            precio: precio,
            total: total,
            kg_por_unidad: kgUnidad,
            kg_total: kgUnidad ? +(stock * kgUnidad).toFixed(2) : null
          };
        });
      STATE.inventario = inv;
      const now = new Date();
      const ts = now.toISOString().slice(0,10) + " " + now.toTimeString().slice(0,5);
      STATE.inventarioMeta = {fileName:file.name, ts, rows:inv.length};
      STATE.config = STATE.config || {};
      STATE.config.fechaActualizacion = now.toISOString();
      // Si la ruta no se ha guardado, usa el nombre como fallback
      if (!STATE.config.rutaInventario) STATE.config.rutaInventario = file.name;
      const sinKg = inv.filter(p => p.kg_por_unidad == null).length;
      const status = sinKg > 0 ? "warn" : "ok";
      const note = sinKg > 0 ? sinKg+" SKUs sin peso detectable" : null;
      STATE.uploads.unshift({file:file.name, type:tipo, ts, rows:inv.length, status, note});
      persist();
      toast("Inventario actualizado: "+inv.length+" SKUs"+(sinKg>0? " ("+sinKg+" sin peso)":""));
      showScreen("importar");
    } catch (err) {
      console.error(err);
      toast("⚠️ Error leyendo Excel: "+err.message);
    }
  };
  reader.onerror = function() { toast("⚠️ No se pudo leer el archivo"); };
  reader.readAsArrayBuffer(file);
}

/* === Exportar datosmonarca.json === */
function exportDatosMonarca() {
  const datos = {
    version: "1.0",
    generado: new Date().toISOString(),
    config: STATE.config || {},
    inventarioMeta: STATE.inventarioMeta || null,
    plantas: STATE.plantas || [],
    maquinas: STATE.maquinas || [],
    materiasPrimas: STATE.materiasPrimas || [],
    recetas: STATE.recetas || {},
    usuarios: (STATE.usuarios||[]).map(u => ({...u, passHash: undefined})) // sin hashes
  };
  const blob = new Blob([JSON.stringify(datos, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = "datosmonarca.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast("datosmonarca.json descargado");
}

/* CHARTS */
function donutSvg(items) {
  const tot = items.reduce((a,x)=>a+x.v,0) || 1;
  const r = 50, cx = 60, cy = 60, sw = 18;
  let acc = 0;
  const arcs = items.map(x => {
    const frac = x.v/tot;
    const a0 = 2*Math.PI*acc; acc += frac;
    const a1 = 2*Math.PI*acc;
    const x0 = cx + r*Math.sin(a0), y0 = cy - r*Math.cos(a0);
    const x1 = cx + r*Math.sin(a1), y1 = cy - r*Math.cos(a1);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    return '<path d="M '+cx+' '+cy+' L '+x0.toFixed(2)+' '+y0.toFixed(2)+' A '+r+' '+r+' 0 '+large+' 1 '+x1.toFixed(2)+' '+y1.toFixed(2)+' Z" fill="'+x.c+'"/>';
  }).join("");
  return '<div class="chart-wrap" style="max-width:130px;"><svg viewBox="0 0 120 120">' +
    arcs +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-sw)+'" fill="#fff"/>' +
    '<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A7A">'+tot+'</text>' +
    '<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="9" fill="#6B7480">SKUs</text>' +
  '</svg></div>';
}

function gaugeSvg(pct, color) {
  pct = Math.max(0, Math.min(100, pct));
  const cx=65, cy=65, r=52, sw=12;
  const circ = 2*Math.PI*r;
  const off  = circ * (1 - pct/100);
  return '<div class="gauge-wrap" style="max-width:130px;"><svg viewBox="0 0 130 130">' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#EEF1F7" stroke-width="'+sw+'"/>' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off.toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')" stroke-linecap="round"/>' +
  '</svg><div class="center-text"><div class="v">'+pct+'%</div><div class="l">cumplimiento</div></div></div>';
}

function barChartSvg(byBod) {
  const entries = Object.entries(byBod).map(function(kv){return {k:kv[0],v:kv[1].unidades};}).sort(function(a,b){return b.v-a.v;}).slice(0,6);
  const max = Math.max.apply(null, entries.map(function(e){return e.v;}));
  const W = 320, H = entries.length*30 + 10;
  const lblW = 90, barW = W - lblW - 60;
  const rows = entries.map(function(e,i){
    const w = (e.v/max)*barW;
    const y = i*30+5;
    return '<text x="0" y="'+(y+18)+'" font-size="11" fill="#1B2433" font-weight="600">'+e.k+'</text>' +
      '<rect x="'+lblW+'" y="'+(y+8)+'" width="'+barW+'" height="14" fill="#EEF1F7" rx="3"/>' +
      '<rect x="'+lblW+'" y="'+(y+8)+'" width="'+w.toFixed(1)+'" height="14" fill="#C0392B" rx="3"/>' +
      '<text x="'+(lblW+w+4)+'" y="'+(y+19)+'" font-size="10.5" fill="#6B7480">'+e.v.toLocaleString('es-CO')+'</text>';
  }).join("");
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'">' + rows + '</svg></div>';
}

function stackedBarSvg() {
  const byBod = {};
  PROD.forEach(function(p){
    const b = p.bodega;
    if (!byBod[b]) byBod[b] = {def:0, sob:0, bal:0};
    if (p.sugerido<0) byBod[b].def++;
    else if (p.sugerido>0) byBod[b].sob++;
    else byBod[b].bal++;
  });
  const entries = Object.entries(byBod).map(function(kv){return {k:kv[0],def:kv[1].def,sob:kv[1].sob,bal:kv[1].bal,t:kv[1].def+kv[1].sob+kv[1].bal};}).sort(function(a,b){return b.t-a.t;});
  const max = Math.max.apply(null, entries.map(function(e){return e.t;}));
  const W = 320, H = entries.length*28 + 10;
  const lblW = 80, barW = W - lblW - 30;
  const rows = entries.map(function(e,i){
    const y = i*28 + 6;
    const wDef = (e.def/max)*barW;
    const wSob = (e.sob/max)*barW;
    const wBal = (e.bal/max)*barW;
    return '<text x="0" y="'+(y+13)+'" font-size="10.5" fill="#1B2433" font-weight="600">'+e.k+'</text>' +
      '<rect x="'+lblW+'" y="'+(y+4)+'" width="'+wDef.toFixed(1)+'" height="14" fill="#C0392B"/>' +
      '<rect x="'+(lblW+wDef).toFixed(1)+'" y="'+(y+4)+'" width="'+wSob.toFixed(1)+'" height="14" fill="#2E8B57"/>' +
      '<rect x="'+(lblW+wDef+wSob).toFixed(1)+'" y="'+(y+4)+'" width="'+wBal.toFixed(1)+'" height="14" fill="#8A8D92"/>' +
      '<text x="'+(lblW+wDef+wSob+wBal+3).toFixed(1)+'" y="'+(y+15)+'" font-size="10" fill="#6B7480">'+e.t+'</text>';
  }).join("");
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'">' + rows + '</svg></div>' +
    '<div class="legend">' +
    '<div class="li"><span class="sw" style="background:#C0392B;"></span>Déficit</div>' +
    '<div class="li"><span class="sw" style="background:#2E8B57;"></span>Sobre stock</div>' +
    '<div class="li"><span class="sw" style="background:#8A8D92;"></span>Balance</div>' +
    '</div>';
}

function lineSvg(points) {
  const W=320, H=130, pad=28;
  const xs = points.map(function(_,i){return pad + (i/(points.length-1))*(W-2*pad);});
  const minV = 50, maxV = 100;
  const ys = points.map(function(p){return H-pad - ((p.v-minV)/(maxV-minV))*(H-2*pad);});
  const d = xs.map(function(x,i){return (i===0?'M':'L')+' '+x.toFixed(1)+' '+ys[i].toFixed(1);}).join(" ");
  const area = 'M '+xs[0].toFixed(1)+' '+(H-pad).toFixed(1)+' L '+xs.map(function(x,i){return x.toFixed(1)+' '+ys[i].toFixed(1);}).join(" L ")+' L '+xs[xs.length-1].toFixed(1)+' '+(H-pad).toFixed(1)+' Z';
  const grid = [60,70,80,90].map(function(v){
    const y = H-pad - ((v-minV)/(maxV-minV))*(H-2*pad);
    return '<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad/2)+'" y2="'+y+'" stroke="#EEF1F7" stroke-width="1"/>' +
      '<text x="0" y="'+(y+3)+'" font-size="9" fill="#6B7480">'+v+'%</text>';
  }).join("");
  const dots = points.map(function(p,i){return '<circle cx="'+xs[i].toFixed(1)+'" cy="'+ys[i].toFixed(1)+'" r="3.5" fill="#1E3A7A" stroke="#fff" stroke-width="1.5"/>';}).join("");
  const labs = points.map(function(p,i){return '<text x="'+xs[i].toFixed(1)+'" y="'+(H-8)+'" font-size="10" text-anchor="middle" fill="#6B7480">'+p.m+'</text>';}).join("");
  const vals = points.map(function(p,i){return '<text x="'+xs[i].toFixed(1)+'" y="'+(ys[i]-8).toFixed(1)+'" font-size="9" text-anchor="middle" fill="#1E3A7A" font-weight="600">'+p.v+'</text>';}).join("");
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'">' + grid +
    '<path d="'+area+'" fill="#1E3A7A" opacity="0.08"/>' +
    '<path d="'+d+'" stroke="#1E3A7A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
    dots + labs + vals + '</svg></div>';
}

function paretoSvg(top10) {
  const W=320, H=170, pad=24;
  const max = Math.max.apply(null, top10.map(function(t){return t.FALTANTE;}));
  const totFalt = top10.reduce(function(a,t){return a+t.FALTANTE;},0);
  const bw = (W - 2*pad) / top10.length;
  let acc = 0;
  const linePts = top10.map(function(t,i){
    acc += t.FALTANTE;
    const x = pad + (i+0.5)*bw;
    const y = H - pad - (acc/totFalt)*(H-2*pad);
    return [x,y];
  });
  const ld = linePts.map(function(p,i){return (i===0?'M':'L')+' '+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(" ");
  const bars = top10.map(function(t,i){
    const h = (t.FALTANTE/max)*(H-2*pad);
    const x = pad + i*bw + 2;
    const y = H-pad-h;
    return '<rect x="'+x+'" y="'+y.toFixed(1)+'" width="'+(bw-4).toFixed(1)+'" height="'+h.toFixed(1)+'" fill="#1E3A7A" rx="2"/>' +
      '<text x="'+(x + (bw-4)/2).toFixed(1)+'" y="'+(H-8)+'" font-size="8" text-anchor="middle" fill="#6B7480">'+t.CODIGO.slice(-3)+'</text>';
  }).join("");
  const dots = linePts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="#8A8D92"/>';}).join("");
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'">' + bars +
    '<path d="'+ld+'" stroke="#8A8D92" stroke-width="2.5" fill="none" stroke-linecap="round"/>' +
    dots + '</svg></div>' +
    '<div class="legend">' +
    '<div class="li"><span class="sw" style="background:#1E3A7A;"></span>Unidades faltantes</div>' +
    '<div class="li"><span class="sw" style="background:#8A8D92;"></span>Acumulado %</div>' +
    '</div>';
}

function openModal(html) {
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").classList.add("on");
}
function closeModal() { document.getElementById("modal").classList.remove("on"); }
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){t.classList.remove("on");}, 2400);
}

async function guardarUsuario(id) {
  const nombre = document.getElementById("usrNombre").value.trim();
  const user   = document.getElementById("usrUser").value.trim().toLowerCase();
  const pass   = document.getElementById("usrPass").value;
  const perfil = document.getElementById("usrPerfil").value;
  const activo = document.getElementById("usrActivo").checked;
  if (!nombre || !user) { toast("Nombre y usuario son obligatorios"); return; }
  if (!id && !pass) { toast("La contraseña es obligatoria al crear un usuario"); return; }
  if (pass && pass.length < 6) { toast("La contraseña debe tener al menos 6 caracteres"); return; }
  const perfilLabel = (PERFILES.find(p=>p.key===perfil)||{}).label || perfil;
  STATE.usuarios = STATE.usuarios || [];
  if (id) {
    const u = STATE.usuarios.find(x=>x.id===id);
    if (!u) { toast("Usuario no encontrado"); return; }
    u.nombre = nombre;
    u.perfil = perfilLabel;
    u.rol    = perfil;
    u.activo = activo;
    if (pass) u.passHash = await sha256(pass);
  } else {
    if (STATE.usuarios.some(x=>x.usuario.toLowerCase()===user)) {
      toast("Ese nombre de usuario ya existe"); return;
    }
    STATE.usuarios.push({
      id: uid('u-'),
      usuario: user,
      passHash: await sha256(pass),
      perfil: perfilLabel,
      rol: perfil,
      nombre: nombre,
      activo: activo,
      creado: new Date().toISOString().slice(0,10)
    });
  }

function cargarMateriasExcel(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') { toast("⚠️ Lector Excel no disponible"); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const sh = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sh, {defval:""});
      if (!rows.length) { toast("Archivo vacío"); return; }
      const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
      const keys = Object.keys(rows[0]);
      // find: itera por candidatos en orden, retorna primera key que contiene ese candidato (sin reusar keys ya tomadas)
      const taken = new Set();
      const find = (...c) => {
        for (const cand of c) {
          const k = keys.find(x => !taken.has(x) && norm(x).includes(cand));
          if (k) { taken.add(k); return k; }
        }
        return null;
      };
      const kCod = find('numero de articulo','numero','codigo','code','sku');
      const kDesc= find('descripcion','description','nombre','articulo');
      const kUnid= find('unidad de medida','unidad','unidad_compra','uom','presentacion');
      const kKg  = find('contenido','contenido_kg','kg/und','peso unitario');
      const kCosto = find('precio de articulo','precio','costo','valor unitario');
      const kStock = find('en stock','stock','existencia','disponible');
      if (!kCod || !kDesc) { toast("⚠️ Faltan columnas con código y descripción"); return; }
      // Filas tipo "Almacén" (separador) — código vacío/no numérico y nombre de almacén en columna desc
      const isHeader = (r) => {
        const cod = String(r[kCod]||'').trim().toLowerCase();
        return !cod || cod === 'almacen' || cod === 'almacén' || cod.length > 20;
      };
      const lista = rows.filter(r => !isHeader(r)).map(r => {
        const desc  = String(r[kDesc]||'').trim();
        const unidad = kUnid ? String(r[kUnid]||'').trim() : '';
        const cVal  = kCosto ? parseFloat(String(r[kCosto]||'0').toString().replace(/[^\d.\-]/g,'')) : 0;
        // Determinar contenido en kg:
        let contenido = kKg ? (parseFloat(String(r[kKg]||'0').toString().replace(/[^\d.\-]/g,'')) || 0) : 0;
        if (!contenido) {
          // 1) Intentar regex en descripción (* 500G, *22 KG, etc.)
          const kg = parseKgPorUnidad(desc);
          if (kg) contenido = kg;
        }
        let unidadCompra = unidad || 'unidad';
        if (!contenido) {
          // 2) Inferir según unidad de medida del Excel
          const u = norm(unidad);
          if (u === 'gramo' || u === 'g' || u === 'gr') {
            // El precio es por gramo → contenido = 0.001 kg
            contenido = 0.001;
            unidadCompra = 'gramo';
          } else if (u === 'kilogramo' || u === 'kg') {
            contenido = 1;
            unidadCompra = 'kilogramo';
          } else if (u.includes('cm3') || u === 'ml' || u === 'mililitro') {
            contenido = 0.001; // densidad ~1 g/cm³ (zumos/salsas)
            unidadCompra = unidad || 'cm3';
          } else if (u === 'litro' || u === 'l') {
            contenido = 1;
            unidadCompra = 'litro';
          } else {
            contenido = 1;
            unidadCompra = unidad || 'unidad';
          }
        }
        return {
          id: uid('mt-'),
          codigo: String(r[kCod]).trim(),
          descripcion: desc,
          unidad_compra: unidadCompra,
          contenido_kg: +contenido.toFixed(4),
          costo_unidad: cVal || 0,
          stock: kStock ? (parseFloat(String(r[kStock]||'0').toString().replace(/[^\d.\-]/g,''))||0) : 0
        };
      }).filter(m => m.codigo && m.descripcion);
      STATE.materiasPrimas = lista;
      persist();
      const sinCosto = lista.filter(m => !m.costo_unidad).length;
      const note = sinCosto ? " ("+sinCosto+" sin costo)" : "";
      toast("Materias primas cargadas: "+lista.length+note);
      showScreen("materias");
    } catch (err) { toast("⚠️ Error: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

            '<div class="info"><div class="t">'+o.op+' · '+(o.kg_total||0).toFixed(0)+' kg</div>' +
              '<div class="s">'+(costo.completo? '$'+costo.total.toLocaleString('es-CO') : 'Faltan recetas · costo parcial $'+costo.total.toLocaleString('es-CO'))+'</div></div>' +
            '<div class="right"><span class="pill '+(costo.completo?'green':'amber')+'">'+(costo.completo?'OK':'Parcial')+'</span></div></div>';
        }).join("")
      ) +
    '</div>' +
    '<div class="card"><h3>Recetas por producto</h3>' +
      '<input id="recSearch" placeholder="Buscar producto..." oninput="filtrarRecetaList(this.value)" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;" />' +
      '<div id="recList">' +
        (enOPsArr.length ? enOPsArr.slice(0,40).map(p=>recetaCard(p, recetas)).join('') : productos.slice(0,40).map(p=>recetaCard(p, recetas)).join('')) +
      '</div>' +
      '<p style="font-size:11px;color:var(--muted);margin-top:6px;">Mostrando '+Math.min(40, enOPsArr.length||productos.length)+' de '+(enOPsArr.length||productos.length)+'.</p>' +
    '</div>';
}

function recetaCard(p, recetas) {
  const items = recetas[p.codigo] || [];
  const totMP = items.length;
  const totKg = items.reduce((a,r)=>a+(r.cantidad_kg||0),0);
  return '<div class="rec-row" data-q="'+(p.codigo+' '+p.descripcion).toLowerCase().replace(/"/g,'&quot;')+'" style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);gap:8px;">' +
    '<div style="flex:1;font-size:13px;"><b>'+p.codigo+'</b> · '+p.descripcion+'<div style="font-size:11px;color:var(--muted);">'+totMP+' insumo'+(totMP===1?'':'s')+(totMP? ' · '+totKg.toFixed(2)+' kg/und':'')+'</div></div>' +
    '<button class="btn sm" onclick="openRecetaModal(\''+p.codigo+'\')">'+(totMP?'Editar':'+ Receta')+'</button>' +
  '</div>';
}

function filtrarRecetaList(q) {
  q = (q||'').toLowerCase().trim();
  document.querySelectorAll('.rec-row').forEach(r => {
    r.style.display = (!q || (r.dataset.q||'').includes(q)) ? 'flex' : 'none';
  });
}

function openRecetaModal(codigo) {
  const productos = currentProductos();
  const p = productos.find(x=>x.codigo===codigo);
  if (!p) return;
  const items = (STATE.recetas||{})[codigo] || [];
  const matsOpts = (STATE.materiasPrimas||[]).map(m => '<option value="'+m.id+'">'+m.codigo+' · '+m.descripcion+'</option>').join("");
  const rowsHtml = items.length
    ? '<table class="t" id="recTable"><thead><tr><th>Materia</th><th class="r">Kg/und</th><th></th></tr></thead><tbody>' +
        items.map((r,i) => {
          const m = (STATE.materiasPrimas||[]).find(x=>x.id===r.materiaId);
          return '<tr data-i="'+i+'" data-mid="'+r.materiaId+'">' +
            '<td style="font-size:12.5px;">'+(m? m.codigo+' · '+m.descripcion : '<span style="color:var(--red);">Materia eliminada</span>')+'</td>' +
            '<td class="r" style="width:90px;"><input type="number" step="0.01" value="'+r.cantidad_kg+'" data-i="'+i+'" style="width:80px;text-align:right;" /></td>' +
            '<td><button class="btn sm danger" onclick="rmRecetaRow('+i+')">×</button></td>' +
          '</tr>';
        }).join("") +
      '</tbody></table>'
    : '<p style="font-size:12.5px;color:var(--muted);">Sin insumos. Agrega abajo.</p>';
  const html = '<button class="x" onclick="closeModal()">×</button>' +
    '<h3>Receta · '+p.codigo+'</h3>' +
    '<p style="font-size:12.5px;color:var(--muted);margin:0 0 8px 0;">'+p.descripcion+'</p>' +
    '<div id="recTableHost">'+rowsHtml+'</div>' +
    '<div class="row" style="margin-top:10px;">' +
      '<select id="recAddMat" style="flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;">' +
        '<option value="">— Materia prima —</option>' + matsOpts + '</select>' +
      '<input id="recAddKg" type="number" step="0.01" placeholder="kg/und" style="width:90px;" />' +
      '<button class="btn sm" onclick="addRecetaRow()">+</button>' +
    '</div>' +
    '<div class="row" style="margin-top:14px;">' +
      '<button class="btn ghost" onclick="closeModal()">Cancelar</button>' +
      '<button class="btn" onclick="guardarReceta(\''+codigo+'\')">Guardar receta</button>' +
    '</div>';
  openModal(html);
}

function addRecetaRow() {
  const mid = document.getElementById("recAddMat").value;
  const kg  = parseFloat(document.getElementById("recAddKg").value);
  if (!mid || !kg || kg <= 0) { toast("Selecciona materia y cantidad"); return; }
  const m = (STATE.materiasPrimas||[]).find(x=>x.id===mid);
  if (!m) return;
  const host = document.getElementById("recTableHost");
  let table = host.querySelector("table#recTable");
  if (!table) {
    host.innerHTML = '<table class="t" id="recTable"><thead><tr><th>Materia</th><th class="r">Kg/und</th><th></th></tr></thead><tbody></tbody></table>';
    table = host.querySelector("table#recTable");
  }
  const tbody = table.querySelector("tbody");
  const i = tbody.children.length;
  const tr = document.createElement('tr');
  tr.dataset.i = i; tr.dataset.mid = mid;
  tr.innerHTML = '<td style="font-size:12.5px;">'+m.codigo+' · '+m.descripcion+'</td>' +
    '<td class="r" style="width:90px;"><input type="number" step="0.01" value="'+kg+'" data-i="'+i+'" style="width:80px;text-align:right;" /></td>' +
    '<td><button class="btn sm danger" onclick="rmRecetaRow('+i+')">×</button></td>';
  tbody.appendChild(tr);
  document.getElementById("recAddMat").value = "";
  document.getElementById("recAddKg").value  = "";
}

function rmRecetaRow(i) {
  const tr = document.querySelector('#recTable tbody tr[data-i="'+i+'"]');
  if (tr) tr.remove();
}

function guardarReceta(codigo) {
  const items = [];
  document.querySelectorAll('#recTable tbody tr').forEach(tr => {
    const mid = tr.dataset.mid;
    const inp = tr.querySelector('input[type=number]');
    const kg  = parseFloat(inp.value);
    if (mid && kg > 0) items.push({materiaId: mid, cantidad_kg: kg});
  });
  STATE.recetas = STATE.recetas || {};
  STATE.recetas[codigo] = items;
  persist();
  closeModal();
  toast("Receta guardada · "+items.length+" insumo(s)");
  showScreen("costeo");
}

/* Calcula costo total de una OP usando recetas y precios de materias primas.
   Retorna {total, completo, items:[{codigo, kg, costo, completo}]} */
function calcularCostoOP(op) {
  const recetas = STATE.recetas || {};
  const mats = STATE.materiasPrimas || [];
  let total = 0;
  let completo = true;
  const items = [];
  (op.productos||[]).forEach(prod => {
    const receta = recetas[prod.codigo] || [];
    const kgUnid = prod.kg_por_unidad || parseKgPorUnidad(prod.desc) || 0;
    const kgTotal = (prod.cant||0) * kgUnid;
    let costoProd = 0;
    let prodCompleto = true;
    if (!receta.length) { prodCompleto = false; completo = false; }
    receta.forEach(r => {
      const m = mats.find(x => x.id === r.materiaId);
      if (!m || !m.contenido_kg || !m.costo_unidad) { prodCompleto = false; completo = false; return; }
      const costoPorKg = m.costo_unidad / m.contenido_kg;
      const kgConsumido = (r.cantidad_kg || 0) * (prod.cant || 0); // kg/und × und
      costoProd += kgConsumido * costoPorKg;
    });
    total += costoProd;
    items.push({codigo: prod.codigo, desc: prod.desc, cant: prod.cant, kg: kgTotal, costo: costoProd, completo: prodCompleto});
  });
  return {total: Math.round(total), completo, items};
}

function openOPCosteo(opId) {
  const o = STATE.prog.find(x=>x.op===opId);
  if (!o) return;
  const c = calcularCostoOP(o);
  const html = '<button class="x" onclick="closeModal()">×</button>' +
    '<h3>Costeo · '+o.op+'</h3>' +
    '<p style="font-size:12.5px;color:var(--muted);margin:0 0 8px 0;">'+o.fecha+' · '+o.turno+(o.maquinaNombre? ' · '+o.maquinaNombre:'')+'</p>' +
    '<table class="t"><thead><tr><th>Producto</th><th class="r">Kg</th><th class="r">Costo</th></tr></thead><tbody>' +
      c.items.map(it => '<tr>' +
        '<td style="font-size:12.5px;"><b>'+it.codigo+'</b><br><span style="font-size:10.5px;color:var(--muted);">'+it.desc.slice(0,38)+(it.desc.length>38?'…':'')+'</span></td>' +
        '<td class="r">'+it.kg.toFixed(1)+'</td>' +
        '<td class="r">'+(it.completo? '$'+Math.round(it.costo).toLocaleString('es-CO') : '<span style="color:var(--red);">parcial $'+Math.round(it.costo).toLocaleString('es-CO')+'</span>')+'</td>' +
      '</tr>').join("") +
    '</tbody></table>' +
    '<div class="card" style="margin-top:14px;background:'+(c.completo?'#DCEFE1':'#FBE7C6')+';">' +
      '<div style="font-size:13px;color:var(--muted);">Costo total estimado</div>' +
      '<div style="font-size:24px;font-weight:700;">$'+c.total.toLocaleString('es-CO')+'</div>' +
      (c.completo? '' : '<div style="font-size:11.5px;color:var(--amber);margin-top:4px;">⚠️ Algunos productos no tienen receta completa.</div>') +
    '</div>' +
    '<div class="row" style="margin-top:14px;">' +
      '<button class="btn ghost" onclick="closeModal()">Cerrar</button>' +
    '</div>';
  openModal(html);
}

init();
</script>

</html>
